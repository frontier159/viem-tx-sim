name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: corepack enable
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # keep in lockstep with release.yml
          node-version: 24.18.0
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0
        with:
          # Update to stable when a new release > v1.7.1 is out
          # Anvil fork tests depend on https://github.com/foundry-rs/foundry/pull/14569
          version: nightly-7debd6d47628c5551837534aee507dbf552d5889
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: committed artifacts are fresh
        run: git diff --exit-code -- src/generated
      - name: types resolve from the packed tarball
        run: pnpm exec attw --pack . --profile esm-only
      - name: packed tarball smoke test
        run: |
          pnpm pack --out /tmp/vts.tgz
          mkdir -p /tmp/vts-smoke && cd /tmp/vts-smoke
          npm init -y > /dev/null
          npm pkg set type=module > /dev/null
          # Keep these pins in sync with package.json devDependency bumps.
          npm install --ignore-scripts /tmp/vts.tgz viem@2.54.1 typescript@5.9.3 @types/node@20.19.43 > /dev/null
          cat > smoke.ts <<'EOF'
          import { TxSimulator, OVERRIDE_TOKEN_AMOUNT } from "viem-tx-sim";
          import { createPublicClient, http } from "viem";
          const sim = TxSimulator.create({ client: createPublicClient({ transport: http("http://127.0.0.1:1") }) });
          const _check: typeof sim.simulate = sim.simulate;
          if (OVERRIDE_TOKEN_AMOUNT !== 10n ** 50n) throw new Error("constant");
          console.log("smoke ok", typeof _check);
          EOF
          npx tsc --strict --module node16 --moduleResolution node16 --target es2022 --skipLibCheck --noEmit smoke.ts
          node --input-type=module -e "import('viem-tx-sim').then(m => { if (!m.TxSimulator?.create) throw new Error('bad export'); console.log('runtime ok'); })"
