[profile.default]
src = "contracts"
out = "out"
cache_path = "cache"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
# The NFT-capture return struct (SimulationResult now carries a nested NftReceipt[] with a bytes
# member) overflows the legacy ABI encoder's 16-slot stack; viaIR is the compiler-recommended fix
# and also shrinks the overall runtime bytecode. Behaviour is identical — tests pin RPC/observation
# semantics, not bytecode bytes.
via_ir = true
evm_version = "cancun"
